<div class="row justify-content-center mt-4">
  <div class="col-md-8 col-lg-6">

    <!-- Error Alert Banner -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show shadow-sm mb-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
      <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
    </div>

    <!-- Creation Card -->
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-header bg-dark text-white py-3 rounded-top-3">
        <h4 class="mb-0 fw-bold">
          <i class="bi bi-journal-plus me-2"></i>Create Topic Stream
        </h4>
      </div>

      <div class="card-body p-4">
        <form [formGroup]="topicForm" (ngSubmit)="onSubmit()">
          
          <!-- New: Skill Name Parent Dropdown Picker -->
          <div class="mb-3">
            <label for="skillId" class="form-label fw-bold text-secondary">Associated Skill Name</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-cpu"></i></span>
              <select 
                id="skillId" 
                formControlName="skillId" 
                class="form-select"
                [class.is-invalid]="topicForm.get('skillId')?.invalid && topicForm.get('skillId')?.touched">
                <option value="" disabled selected>
                  {{ isSkillsLoading ? 'Loading skills inventory...' : 'Choose target skill domain...' }}
                </option>
                <!-- Loop options dynamically from the loaded skills collection -->
                <option *ngFor="let skill of skills" [value]="skill">
                  {{ skill}} 
                </option>
              </select>
              <div class="invalid-feedback">Please select an associated parent skill mapping.</div>
            </div>
          </div>

          <!-- Parent Topic Input Group -->
          <div class="mb-4 pb-3 border-bottom">
            <label for="topicName" class="form-label fw-bold text-secondary">Topic Header Name</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-bookmark-star"></i></span>
              <input 
                type="text" 
                id="topicName" 
                formControlName="name" 
                class="form-control" 
                placeholder="e.g., Spring Boot Advanced Security"
                [class.is-invalid]="topicForm.get('name')?.invalid && topicForm.get('name')?.touched">
              <div class="invalid-feedback">Topic container name requires at least 2 characters.</div>
            </div>
          </div>

          <!-- Dynamic Nested Sub-Topics Group -->
        <!-- Dynamic Nested Sub-Topics Group Container -->
<div class="mb-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="fw-bold text-dark mb-0">
      <i class="bi bi-list-nested text-primary me-1"></i> Sub-Topic Specifications
    </h5>
    <button type="button" class="btn btn-sm btn-outline-primary px-3 rounded-pill" (click)="addSubTopic()">
      <i class="bi bi-plus-lg me-1"></i> Add Sub-Topic
    </button>
  </div>

  <!-- Form Array Loop -->
  <div formArrayName="subTopicSet">
    <div 
      *ngFor="let controlGroup of subTopicSet.controls; let i = index" 
      [formGroupName]="i" 
      class="card border border-light-subtle bg-light bg-opacity-25 mb-3 shadow-sm">
      
      <!-- Card Header row tracker & Delete trigger -->
      <div class="card-header bg-light py-2 d-flex justify-content-between align-items-center">
        <span class="badge bg-secondary font-monospace">Sub-Topic #{{ i + 1 }}</span>
        <button 
          type="button" 
          class="btn btn-sm btn-link text-danger p-0 border-0 text-decoration-none" 
          (click)="removeSubTopic(i)"
          *ngIf="subTopicSet.length > 1">
          <i class="bi bi-trash-fill me-1"></i>Remove
        </button>
      </div>

      <!-- Streamlined Input Content Grid -->
      <div class="card-body p-3">
        <div class="row g-3">
          
          <!-- Sub-Topic Name Field -->
          <div class="col-12">
            <label class="form-label small fw-semibold text-secondary mb-1">Sub-Topic Title Name</label>
            <input 
              type="text" 
              formControlName="name" 
              class="form-control form-control-sm" 
              placeholder="e.g., Stream.map() vs flatMap()"
              [class.is-invalid]="controlGroup.get('name')?.invalid && controlGroup.get('name')?.touched">
            <div class="invalid-feedback">Sub-topic title name is required.</div>
          </div>

          <!-- Notes Text Area Field -->
          <div class="col-12">
            <label class="form-label small fw-semibold text-secondary mb-1">Knowledge Base Notes / Review Flags</label>
            <textarea 
              formControlName="notes" 
              class="form-control form-control-sm" 
              rows="3" 
              placeholder="Add key observations, syntax nuances, or interview highlights here..."></textarea>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>


          <!-- Actions Footer Group -->
          <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3 border-top">
            <button type="button" class="btn btn-outline-secondary px-4" [routerLink]="['/topics']" [disabled]="isSubmitting">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary px-4" [disabled]="topicForm.invalid || isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1" role="status"></span>
              <i *ngIf="!isSubmitting" class="bi bi-cloud-arrow-up me-1"></i> Save Hierarchy
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

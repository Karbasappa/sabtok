<div class="row justify-content-center mt-4">
  <div class="col-md-8 col-lg-6">

    <!-- Loading Screen Layout -->
    <div *ngIf="isLoading" class="text-center my-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2">Retrieving active configurations...</p>
    </div>

    <!-- Error Alert Panel Banner -->
    <div *ngIf="errorMessage && !isLoading" class="alert alert-danger alert-dismissible fade show shadow-sm mb-3">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
      <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
    </div>

    <!-- Main Entry Container Card Form -->
    <div class="card shadow-sm border-0 rounded-3" *ngIf="!isLoading">
      <div class="card-header bg-warning text-dark py-3 rounded-top-3">
        <h4 class="mb-0 fw-bold">
          <i class="bi bi-pencil-square me-2"></i>Modify Topic Hierarchy
        </h4>
      </div>

      <div class="card-body p-4">
        <form [formGroup]="topicForm" (ngSubmit)="onSubmit()">
          
          <!-- Parent Name Input Block -->
          <div class="mb-4 pb-3 border-bottom">
            <label for="topicName" class="form-label fw-bold text-secondary">Topic Header Name</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-bookmark-star"></i></span>
              <input 
                type="text" 
                id="topicName" 
                formControlName="name" 
                class="form-control" 
                placeholder="Topic container name..."
                [class.is-invalid]="topicForm.get('name')?.invalid && topicForm.get('name')?.touched">
              <div class="invalid-feedback">Topic container name requires at least 2 characters.</div>
            </div>
          </div>

          <!-- Dynamic Nested SubTopics Form Array Section -->
          <div class="mb-4">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h5 class="fw-bold text-dark mb-0">
                <i class="bi bi-list-nested text-warning me-1"></i> Sub-Topic Specifications
              </h5>
              <button type="button" class="btn btn-sm btn-outline-warning text-dark px-3 rounded-pill" (click)="addSubTopic()">
                <i class="bi bi-plus-lg me-1"></i> Add Sub-Topic
              </button>
            </div>

            <!-- Loop Block Tracking Inner Form Control Groups -->
            <div formArrayName="subTopicSet">
              <div 
                *ngFor="let controlGroup of subTopicSet.controls; let i = index" 
                [formGroupName]="i" 
                class="card border border-light-subtle bg-light bg-opacity-25 mb-3 shadow-sm">
                
                <!-- Sub Card Controls Header -->
                <div class="card-header bg-light py-2 d-flex justify-content-between align-items-center">
                  <span class="badge bg-dark font-monospace">Sub-Topic #{{ i + 1 }}</span>
                  <button 
                    type="button" 
                    class="btn btn-sm btn-link text-danger p-0 border-0 text-decoration-none" 
                    (click)="removeSubTopic(i)"
                    *ngIf="subTopicSet.length > 1">
                    <i class="bi bi-trash-fill me-1"></i>Remove
                  </button>
                </div>

                <!-- Structured Dynamic Full Input Grid -->
                <div class="card-body p-3">
                  <div class="row g-3">
                    
                    <!-- Title name segment -->
                    <div class="col-12 col-md-8">
                      <label class="form-label small fw-semibold text-secondary mb-1">Sub-Topic Title Name</label>
                      <input 
                        type="text" 
                        formControlName="name" 
                        class="form-control form-control-sm" 
                        placeholder="e.g., Stream API"
                        [class.is-invalid]="controlGroup.get('name')?.invalid && controlGroup.get('name')?.touched">
                      <div class="invalid-feedback">Sub-topic title name is required.</div>
                    </div>

                    <!-- Expertise Rating Dropdown -->
                    <div class="col-12 col-md-4">
                      <label class="form-label small fw-semibold text-secondary mb-1">Expertise Rating</label>
                      <select formControlName="rating" class="form-select form-select-sm">
                        <option [value]="1">⭐ (Beginner)</option>
                        <option [value]="2">⭐⭐ (Basic)</option>
                        <option [value]="3">⭐⭐⭐ (Intermediate)</option>
                        <option [value]="4">⭐⭐⭐⭐ (Advanced)</option>
                        <option [value]="5">⭐⭐⭐⭐⭐ (Expert)</option>
                      </select>
                    </div>

                    <!-- Number Tracking Metrics Blocks Row Mapping -->
                    <div class="col-4">
                      <label class="form-label small fw-semibold text-secondary mb-1">Total Attempts</label>
                      <input type="number" formControlName="noOfAttempts" class="form-control form-control-sm text-center" min="0">
                    </div>

                    <div class="col-4">
                      <label class="form-label small fw-semibold text-success mb-1">Passed Count</label>
                      <input type="number" formControlName="passedNumber" class="form-control form-control-sm text-center border-success-subtle text-success" min="0">
                    </div>

                    <div class="col-4">
                      <label class="form-label small fw-semibold text-danger mb-1">Failed Count</label>
                      <input type="number" formControlName="failedNumber" class="form-control form-control-sm text-center border-danger-subtle text-danger" min="0">
                    </div>

                    <!-- Notes segment area -->
                    <div class="col-12">
                      <label class="form-label small fw-semibold text-secondary mb-1">Knowledge Base Notes / Review Flags</label>
                      <textarea 
                        formControlName="notes" 
                        class="form-control form-control-sm" 
                        rows="3" 
                        placeholder="Update core documentation highlights here..."></textarea>
                    </div>

                  </div>
                </div>

              </div>
            </div>
          </div>

          <!-- Lower Actions Control Panel Buttons -->
          <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-3 border-top">
            <button type="button" class="btn btn-outline-secondary px-4" [routerLink]="['/topics']" [disabled]="isSubmitting">
              Cancel
            </button>
            <button type="submit" class="btn btn-warning px-4 text-dark fw-semibold" [disabled]="topicForm.invalid || isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1" role="status"></span>
              <i *ngIf="!isSubmitting" class="bi bi-check-all me-1"></i> Update Changes
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
